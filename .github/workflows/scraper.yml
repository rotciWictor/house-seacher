name: House Searcher Scraper

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Run OLX Scraper
        run: npx tsx scraper/index.ts

      - name: Run ZAP + VivaReal Scraper
        run: npx tsx scraper/zap.ts

      - name: Run Mercado Livre Scraper
        run: npx tsx scraper/mercadolivre.ts

      - name: Run Chaves na Mão Scraper
        run: npx tsx scraper/chavesnamao.ts

      - name: Run Zone Enrichment
        run: npx tsx scraper/enrich.ts

      - name: Commit and push changes
        run: |
          git config --global user.name "House Searcher Bot"
          git config --global user.email "bot@housesearcher.com"
          git add src/data/properties.json
          git commit -m "🏠 Update properties [skip ci]" || echo "No changes to commit"
          git push
