name: House Searcher Scraper

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Run OLX Scraper
        run: |
          for i in 1 2 3; do npx tsx scraper/index.ts && break || { echo "Retry $i failed"; if [ $i -eq 3 ]; then exit 1; else sleep 10; fi; }; done

      - name: Run ZAP + VivaReal Scraper
        run: |
          for i in 1 2 3; do npx tsx scraper/zap.ts && break || { echo "Retry $i failed"; if [ $i -eq 3 ]; then exit 1; else sleep 10; fi; }; done

      - name: Run Mercado Livre Scraper
        run: |
          for i in 1 2 3; do npx tsx scraper/mercadolivre.ts && break || { echo "Retry $i failed"; if [ $i -eq 3 ]; then exit 1; else sleep 10; fi; }; done

      - name: Run Chaves na Mão Scraper
        run: |
          for i in 1 2 3; do npx tsx scraper/chavesnamao.ts && break || { echo "Retry $i failed"; if [ $i -eq 3 ]; then exit 1; else sleep 10; fi; }; done

      - name: Run Zone Enrichment
        run: |
          for i in 1 2 3; do npx tsx scraper/enrich.ts && break || { echo "Retry $i failed"; if [ $i -eq 3 ]; then exit 1; else sleep 10; fi; }; done

      - name: Commit and push changes
        run: |
          git config --global user.name "House Searcher Bot"
          git config --global user.email "bot@housesearcher.com"
          git commit -m "Auto-update properties (Supabase sync) [skip ci]" || echo "No changes to commit"
          git push

      - name: Create Alert Issue on Failure
        if: failure()
        run: |
          gh issue create --title "🚨 Falha Crítica no Scraper" --body "O fluxo do scraper falhou após todas as 3 tentativas de retry. Verifique os logs do GitHub Actions para entender o erro." --repo ${{ github.repository }} || echo "Failed to create issue"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
