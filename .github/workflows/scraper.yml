name: House Searcher Scraper

on:
  schedule:
    - cron: "0 */5 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        scraper: [index.ts, zap.ts, vivareal.ts, mercadolivre.ts, chavesnamao.ts]
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          npm ci || npm install
          cd scraper && npm install

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Run Scraper (${{ matrix.scraper }})
        run: |
          for i in 1 2 3; do npx tsx scraper/${{ matrix.scraper }} && break || { echo "Retry $i failed"; if [ $i -eq 3 ]; then exit 1; else sleep 10; fi; }; done

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy
        run: |
          if [ -z "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}" ]; then
            echo "Deploy hook não configurado."
            exit 0
          else
            curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
            echo "Deploy na Vercel trigado com sucesso."
          fi
